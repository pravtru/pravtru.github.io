<script>
var p1, xmlDoc, xmlBlk, t0, t1, x1;
//Параметры строки
const urlParams = new URLSearchParams(window.location.search);
const name = urlParams.get('name');

//Если пустой параметр, то запросить
if (!name) {
 var myModal = new bootstrap.Modal(document.getElementById('Md1'), {});
 myModal.show();
} else {
 zpr( name ); //Запрос основного
}

//События кнопок
document.getElementById('mn1').addEventListener('click', function () {
 var myModal = new bootstrap.Modal(document.getElementById('Md2'), {});
 myModal.show();
});
document.getElementById('mdl1k').addEventListener('click', function () {
 zpr( document.getElementById('eS1').value ); //Запрос выбранного
});
document.getElementById('mdl2k').addEventListener('click', function () {
    console.log( document.getElementById('1_eT1').value );
    console.log( document.getElementById('1_eT2').value );
});

//Функция запроса данных
function getData( url, ready ) {
  var xhr = new XMLHttpRequest();
  xhr.open( 'GET', url, true );
  xhr.onreadystatechange = function() {
   if( this.readyState === 4 && this.status !== 404 ) {
    ready( this.responseText );
   }
  }
  xhr.send();
}

//Запрос первого
function zpr( nm1 ) {
getData( 'https://pravtru.github.io/' + nm1 + '.xml', function( templateData ) {
    p1 = new DOMParser();
    xmlDoc = p1.parseFromString(templateData,"text/xml");
    xmlBlk = xmlDoc.children[0];    
    document.getElementById("tit").innerHTML = xmlBlk.getAttribute('Name');
    document.getElementById("nzv").innerHTML = 'Содержание ' + xmlBlk.getAttribute('Name') + '(' + nm1 + '.xml)';
    document.getElementById("id3").textContent = templateData;

    //console.log(xmlBlk.children);

    //Перебор дочерних
    var Cd = xmlBlk.children;
    if (Cd.length > 0) {
     for (let i = 0; i < Cd.length; i++) {
      cild(Cd[i]);
     }
    }

    vyvod();
});
}

//Проверка на блок и просмотр дочерних
function cild(Cd0) {
 var cName = Cd0.nodeName;
 if (cName === "Blok") {
  zpr0(Cd0);
 }

 //Поиск дочерних
 var Cd = Cd0.children;
 if (Cd.length > 0) {
  for (let i = 0; i < Cd.length; i++) {
   cild(Cd[i]);
  }
 }
}

//Запрос дочерних блоков
function zpr0(nm1) { //Искомый блок и родитель
var N0 = nm1.parentNode;
N0.removeChild(nm1);

getData( 'https://pravtru.github.io/' + nm1.getAttribute('Name') + '.xml', function( templateData ) {

    p1 = new DOMParser();
    var xmlDoc1 = p1.parseFromString(templateData,"text/xml");
    //console.log(xmlDoc1.getElementsByTagName("svg")[0].children[0]);


    //Перенос атрибутов и содержимого в новые элементы
    var CdS = xmlDoc1.getElementsByTagName("svg")[0].children;
    if (CdS.length > 0) {
     for (let i = 0; i < CdS.length; i++) {
      var N1 = CdS[i].attributes;
      var markerDiv = xmlDoc.createElement(CdS[i].nodeName);
      markerDiv.innerHTML = CdS[i].innerHTML;
      for (let j = 0; j < N1.length; j++) {
       markerDiv.setAttribute(N1[j].name, N1[j].value);
      }
      inPr(nm1, markerDiv); 
      N0.appendChild(markerDiv);
     }
    }


    //console.log(markerDiv.children);

    //Перебор дочерних
    var Cd = N0.children;
    if (Cd.length > 0) {
     for (let i = 0; i < Cd.length; i++) {
      cild(Cd[i]);
     }
    }

    vyvod();
});
}

//
function inPr(Prs, N0) { //Искомый блок и новый элемент для добавления
 var Pr = Prs.children;
 var id = N0.getAttribute('id');
 
 N0.removeAttribute('id');

 //Замена на параметры
 if (id !== null) {
  for (let i = 0; i < Pr.length; i++) {
   var bid = Pr[i].getAttribute('bid');
    if (id === bid) {
     var N1 = Pr[i].attributes; //пербор атрибутов
     for (let j = 0; j < N1.length; j++) {
      if (N1[j].name !== 'bid') {
       N0.setAttribute(N1[j].name, N1[j].value); //присвоение атрибутов из Pr
      }
     }
     if (Pr[i].innerHTML.length > 0) {
      N0.innerHTML = Pr[i].innerHTML;
     }
    }
  }
 }

 //Пребор всех наследников
 var Cd = N0.children;
 if (Cd.length > 0) {
  for (let i = 0; i < Cd.length; i++) {
   inPr(Prs, Cd[i]);
  }
 }
}

//Вывод содержимого
function vyvod() {
 var ih = '';
 var Svg = xmlBlk.children;
 if (Svg.length > 0) {
   ih = Svg[0].outerHTML;
 }
 if (Svg.length > 1) {
  for (let i = 1; i < Svg.length; i++) {
   ih = ih + '<br />' + Svg[i].outerHTML;
  }
 }
 document.getElementById("id1").innerHTML = ih;
 document.getElementById("id2").textContent = ih;
}
